version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: whatsapp-analytics-db
    environment:
      POSTGRES_DB: ${DB_NAME:-whatsapp_analytics}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: whatsapp-analytics-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: whatsapp-analytics-backend
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    environment:
      - BACKEND_PORT=3000
      - BACKEND_LOG_LEVEL=debug
      - WHATSAPP_API_BASE_URL=${WHATSAPP_API_BASE_URL}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-whatsapp_analytics}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["sh", "-c", "node dist/database/run-migrations.js && node dist/main.js"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: whatsapp-analytics-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://backend:3000
    depends_on:
      - backend

volumes:
  db_data:
