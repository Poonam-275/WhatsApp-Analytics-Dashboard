name: CI
on:
  push:
    branches: [ main, master, develop, '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run -w shared build
      - run: npm run -w backend typecheck
      - run: npm run -w frontend typecheck
      - run: npm run -w backend lint
      - run: npm run -w frontend lint
